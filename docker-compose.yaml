version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: metier-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: metier_blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./metier-db/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./metier-db/02-init.sql:/docker-entrypoint-initdb.d/02-init.sql
    networks:
      - metier-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: metier-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@metier.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - metier-network

  next-app:
    image: oven/bun:1
    container_name: metier-next-app
    working_dir: /app
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./metier-app:/app
      - /app/node_modules
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/metier_blog?schema=public"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:3000/api"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin123"
      JWT_SECRET: "supersecretjwt"
    depends_on:
      - postgres
    command: >
      sh -c "
        bun install &&
        bunx prisma generate &&
        bunx prisma db push &&
        bun run dev
      "
    networks:
      - metier-network

volumes:
  postgres_data:

networks:
  metier-network: